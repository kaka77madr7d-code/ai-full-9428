
<html>
<body style="background:#111;color:white;text-align:center;font-family:sans-serif">
<h1>🔥 AI Generated App</h1>
<button onclick="run()">تشغيل</button>
<pre id="out"></pre>

<script>
async function run(){

 let d = await r.json()
 document.getElementById('out').innerText = JSON.stringify(d, null, 2)
}
</script>
